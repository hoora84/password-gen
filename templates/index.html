<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
</head>
<body>
    <center>
    <h1> Password Generator</h1>


    <form method="POST">
        <label>Password length:</label>
        <input type="number", name="length",min="8" ,value="12">

        <br>
        <br>

        <button type="submit" color="green" >Generate Password</button>

    </form>

    {% if Password %}
      <h2>Your Password</h2>
      <p>{{Password}}</p>
    {% endif %}

    </center>


    
</body>
</html>
